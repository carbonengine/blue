# This file defines settings for all modules that link against Blue with Stackless
Imports:
- ../stackless/stackless.yaml
- ../../../../../../sdk/telemetry/2.0k/telemetry_2.0k.yaml

General:
  OutDir: ../../autobuild/$(ProjectName)/exefile/$(Platform)/$(PlatformToolset)/
  TargetExt: .dll

Link:
  AdditionalLibraryDirectories:
  - ../../../carbon/autobuild/blue/exefile/$(Platform)/$(PlatformToolset)/

Configurations:
  Debug|Win32,x64:
    Link:
      AdditionalDependencies:
      - blue_d.lib

  Release|Win32,x64:
    Link:
      AdditionalDependencies:
      - blue.lib
