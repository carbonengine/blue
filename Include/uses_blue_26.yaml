# This file defines settings for all modules that link against Blue with Python 2.6
Imports:
- ../../../../../../../sdk/Python/ccpproj/Python_2.6.yaml
- ../../../../../../../sdk/telemetry/3.0.1.1008/telemetry_3.0.1.1008.yaml

General:
  OutDir: ../../autobuild/$(ProjectName)/python_26/$(Platform)/$(PlatformToolset)/
  TargetExt: .pyd

Link:
  AdditionalLibraryDirectories:
  - ../../blue/python_26/$(Platform)/$(PlatformToolset)
  - ../../../carbon/autobuild/blue/python_26/$(Platform)/$(PlatformToolset)

Configurations:
  Debug|Win32,x64:
    Link:
      AdditionalDependencies:
      - blue_d.lib

  Release|Win32,x64:
    Link:
      AdditionalDependencies:
      - blue.lib
